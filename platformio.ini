; Filament Width Sensor — ESP32 + Hall sensors + OLED + WiFi WebServer
; https://github.com/peet7666/filament-width-sensor

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; Filesystem for web UI and config storage
board_build.filesystem = littlefs

lib_deps =
    ; OLED display (SSD1306 / SH1106 — universal driver)
    olikraus/U8g2 @ ^2.35.7
    ; Async web server
    esphome/ESPAsyncWebServer-esphome @ ^3.3.0
    ; JSON (config, calibration table)
    bblanchon/ArduinoJson @ ^7.3.1

build_flags =
    -DCORE_DEBUG_LEVEL=0

; ── Pin definitions ──────────────────────────────────────────────
;  Hall sensor 1 ADC  : GPIO34  (ADC1_CH6, input-only)
;  Hall sensor 2 ADC  : GPIO35  (ADC1_CH7, input-only, reserved)
;  PWM output         : GPIO25  (filament width → duty cycle)
;  Alarm output       : GPIO26  (HIGH = OK, LOW = out of range)
;  Alarm inverted     : GPIO27  (LOW = OK, HIGH = out of range)
;
;  OLED I2C pins depend on your specific module — set in config.h
